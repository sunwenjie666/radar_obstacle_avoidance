remap_manager:
  enable_auto_remap: true
  min_remap_interval: 10.0
  feature_entropy_threshold: 1.5
  residual_threshold: 0.1
  min_position_accuracy: 0.05
  map_type: 0
  map_resolution: 0.1
  max_map_points: 1000000
  planner_type: 0
  path_clearance: 1.0
  max_planning_time: 5.0
  publish_map_markers: true
  publish_path_markers: true
  map_update_rate: 1.0

path_planner:
  grid_resolution: 0.5
  grid_size_x: 100
  grid_size_y: 100
  grid_size_z: 20
  obstacle_inflation: 1.0
  heuristic_weight: 1.0
