# 融合策略配置
# 支持: 雷达优先 / 视觉优先 / BEV软关联融合

fusion:
  # 融合模式: "complementary" | "bev_soft" | "bev_attention"
  strategy: "bev_attention"

  # BEV + 软关联 + 交叉注意力模式
  bev_soft:
    # 软关联权重 (α·G_img + β·G_3d + γ·score)
    alpha: 0.5    # 图像空间距离
    beta: 0.3     # 3D空间距离
    gamma: 0.2    # 检测置信度
    sigma_img: 50.0   # 图像高斯sigma (像素)
    sigma_3d: 2.0     # 3D高斯sigma (米)

    # 交叉注意力
    enable_attention: true
    d_model: 32
    local_radius: 5.0    # 局部注意力半径 (米)
    min_points: 5        # 最少点数

    # BEV参数
    local_bev_size: 20.0   # 局部BEV尺寸 (米)
    bev_resolution: 0.2    # BEV网格分辨率 (米)

  # 互补融合 (旧版)
  radar_preference:
    distance: 5.0           # 5米内雷达更可靠
    confidence_threshold: 0.7

  vision_preference:
    object_classification: true
    tracking_stability: 0.8

  # 安全
  emergency:
    min_safe_distance: 1.0
    fusion_fallback: "radar"
